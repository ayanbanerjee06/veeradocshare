<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documentation Index</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 2rem;
      background: #f4f6fb;
      color: #111827;
    }
    main {
      max-width: 800px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
    }
    p {
      color: #4b5563;
      line-height: 1.7;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 1.5rem 0 0;
    }
    li {
      margin: 0.75rem 0;
    }
    a {
      color: #2563eb;
      text-decoration: none;
      font-size: 1.1rem;
    }
    a:hover {
      text-decoration: underline;
    }
    .note {
      margin-top: 1.5rem;
      color: #6b7280;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <h1>HTML Documents</h1>
    <p>Use this index page to open the HTML documents available in this folder.</p>
    <ul>
      <li><a href="Home.html">Home.html</a></li>
    </ul>
    <p class="note">Add more HTML files to this folder and update this index to include additional links.</p>
  </main>
</body>
</html>
